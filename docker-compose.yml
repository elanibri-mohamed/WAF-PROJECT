version: "3.9"

# ─────────────────────────────────────────────────────────────
#  WAF Project — Phase 1 + Phase 2
#
#  Services:
#    dvwa        → vulnerable target app  (internal only)
#    db          → MariaDB for DVWA       (internal only)
#    waf         → ModSecurity + Nginx    (public-facing :8080)
#
#  Usage:
#    Phase 1 (no WAF):  docker compose up dvwa db
#    Phase 2 (with WAF): docker compose up
#
#  Access:
#    Phase 1 (unprotected): http://localhost:8888
#    Phase 2 (protected)  : http://localhost:8080
# ─────────────────────────────────────────────────────────────

services:

  # ── MariaDB — DVWA database ──────────────────────────────────
  db:
    image: mariadb:10.6
    container_name: dvwa-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dvwa
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: dvwa
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dvwa", "-pdvwa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DVWA — vulnerable target ─────────────────────────────────
  dvwa:
    image: ghcr.io/digininja/dvwa:latest
    container_name: dvwa-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_SERVER: db
      DB_PORT: 3306
      DB_DATABASE: dvwa
      DB_USER: dvwa
      DB_PASSWORD: dvwa
      RECAPTCHA_PRIV_KEY: ""
      RECAPTCHA_PUB_KEY: ""
    networks:
      - internal
      - public
    ports:
      - "8888:80"

  # ── ModSecurity WAF (Nginx) — Phase 2 ─────────────────────────
    # ── ModSecurity WAF (Nginx) — Phase 2 ─────────────────────────
  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: modsec-waf
    restart: unless-stopped
    depends_on:
      - dvwa
    environment:
      BACKEND: "http://dvwa:80"
      MODSEC_RULE_ENGINE: "On"
      PARANOIA: 1
      ANOMALY_INBOUND: 5
      ANOMALY_OUTBOUND: 4
      PORT: 8080
      ACCESSLOG: "/var/log/nginx/access.log"
      ERRORLOG: "/var/log/nginx/error.log"
    volumes:
      # Your existing Nginx config (as template)
      - ./phase2-modsecurity/nginx/default.conf:/etc/nginx/templates/conf.d/default.conf.template:ro
      # Mount custom exclusions to a NEUTRAL location (not auto-included)
      # Changing from /etc/modsecurity.d/owasp-crs/rules/ to /etc/nginx/
      - ./phase2-modsecurity/crs-setup/custom-exclusions.conf:/etc/nginx/custom-exclusions.conf:ro
      # Persist WAF logs
      - waf_logs:/var/log/nginx
    ports:
      - "8080:8080"
    networks:
      - public
      - internal

  phase3-waf:
    build:
      context: ./phase3-custom-waf
    container_name: phase3-waf
    restart: unless-stopped
    depends_on:
      - dvwa
    environment:
      WAF_HOST: "0.0.0.0"
      WAF_PORT: "8090"
      BACKEND_URL: "http://dvwa:80"
    volumes:
      - ./phase3-custom-waf/logs:/app/logs
    ports:
      - "8090:8090"
    networks:
      - public
      - internal

volumes:
  db_data:
  waf_logs:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge