<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 — Request Blocked</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

    :root {
      --red:    #ff2b2b;
      --amber:  #ffaa00;
      --dim:    #ff2b2b33;
      --bg:     #080808;
      --panel:  #0f0f0f;
      --border: #1e1e1e;
      --text:   #c8c8c8;
      --muted:  #444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    .terminal {
      width: 100%;
      max-width: 680px;
      border: 1px solid var(--border);
      background: var(--panel);
      position: relative;
    }

    /* Top bar */
    .bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: #0a0a0a;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ff5f56; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #27c93f; }
    .bar-title {
      margin-left: auto;
      margin-right: auto;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Body */
    .body { padding: 40px 40px 48px; }

    /* Glitchy 403 */
    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 18vw, 140px);
      line-height: 1;
      color: var(--red);
      letter-spacing: -4px;
      position: relative;
      display: inline-block;
      animation: glitch 4s infinite;
    }
    .code::before,
    .code::after {
      content: '403';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
    }
    .code::before {
      color: #00ffff22;
      animation: glitch-a 4s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    }
    .code::after {
      color: var(--dim);
      animation: glitch-b 4s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    }

    @keyframes glitch {
      0%, 92%, 100% { transform: none; }
      93%  { transform: skewX(-2deg); }
      94%  { transform: skewX(2deg); }
      95%  { transform: none; }
    }
    @keyframes glitch-a {
      0%, 92%, 100% { transform: none; opacity: 0; }
      93%  { transform: translate(-3px, 0); opacity: 1; }
      94%  { transform: translate(3px, 0); opacity: 1; }
      95%  { opacity: 0; }
    }
    @keyframes glitch-b {
      0%, 92%, 100% { transform: none; opacity: 0; }
      93%  { transform: translate(3px, 0); opacity: 1; }
      94%  { transform: translate(-3px, 0); opacity: 1; }
      95%  { opacity: 0; }
    }

    .title {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--amber);
      margin-top: 8px;
      margin-bottom: 32px;
    }

    /* Info table */
    .info {
      border: 1px solid var(--border);
      padding: 20px 24px;
      margin-bottom: 32px;
      display: grid;
      gap: 12px;
    }
    .row { display: grid; grid-template-columns: 140px 1fr; gap: 12px; align-items: start; }
    .label { color: var(--muted); font-size: 11px; letter-spacing: 1px; padding-top: 2px; }
    .value { color: var(--text); font-size: 13px; word-break: break-all; }
    .value.red { color: var(--red); }
    .value.amber { color: var(--amber); }

    /* Blinking cursor line */
    .prompt {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .prompt::before { content: '> '; color: var(--red); }
    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--red);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Red glow border on left */
    .terminal::before {
      content: '';
      position: absolute;
      left: -1px; top: 20%; bottom: 20%;
      width: 2px;
      background: var(--red);
      box-shadow: 0 0 12px var(--red), 0 0 24px var(--dim);
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="bar">
      <span class="dot dot-r"></span>
      <span class="dot dot-y"></span>
      <span class="dot dot-g"></span>
      <span class="bar-title">waf-intercept // threat-blocked</span>
    </div>
    <div class="body">
      <div class="code">403</div>
      <div class="title">Request Intercepted &amp; Blocked</div>

      <div class="info">
        <div class="row">
          <span class="label">STATUS</span>
          <span class="value red">THREAT DETECTED — ACCESS DENIED</span>
        </div>
        <div class="row">
          <span class="label">ENGINE</span>
          <span class="value">CustomWAF / Python aiohttp v1.0</span>
        </div>
        <div class="row">
          <span class="label">RULE ID</span>
          <span class="value amber">{{RULE_ID}}</span>
        </div>
        <div class="row">
          <span class="label">RULE NAME</span>
          <span class="value">{{RULE_NAME}}</span>
        </div>
        <div class="row">
          <span class="label">LOCATION</span>
          <span class="value">{{LOCATION}}</span>
        </div>
        <div class="row">
          <span class="label">ACTION</span>
          <span class="value red">DROPPED — event logged</span>
        </div>
      </div>

      <div class="prompt">
        request terminated. this incident has been recorded.
        <span class="cursor"></span>
      </div>
    </div>
  </div>
</body>
</html>
