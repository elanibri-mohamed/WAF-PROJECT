# ─────────────────────────────────────────────────────────────
#  Custom ModSecurity Exclusions for DVWA
#  File: phase2-modsecurity/crs-setup/custom-exclusions.conf
#
#  Purpose: Reduce false positives so a normal user can still
#  navigate DVWA while keeping real attacks blocked.
#
#  IMPORTANT: These exclusions are DVWA-specific. In a real
#  production environment you would be much more conservative.
#  Each exclusion is documented with WHY it is needed.
# ─────────────────────────────────────────────────────────────


# ── 1. DVWA Setup Page ────────────────────────────────────────
# The setup page POSTs DB credentials — CRS 942xxx (SQLi) rules
# fire on the word "password" in form fields.
SecRule REQUEST_URI "@beginsWith /setup.php" \
    "id:9001001, \
     phase:1, \
     pass, \
     nolog, \
     ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:db_password, \
     msg:'DVWA exclusion: setup.php db_password field'"


# ── 2. DVWA Login Page ────────────────────────────────────────
# The username/password fields trigger CRS 942100 (SQL tautology)
# when submitting credentials because of how DVWA forms work.
SecRule REQUEST_URI "@beginsWith /login.php" \
    "id:9001002, \
     phase:1, \
     pass, \
     nolog, \
     ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:username, \
     ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:password, \
     msg:'DVWA exclusion: login.php credential fields'"


# ── 3. DVWA Security Settings ────────────────────────────────
# POSTing the security level form submits a cookie value
# that can trip generic injection rules.
SecRule REQUEST_URI "@beginsWith /security.php" \
    "id:9001003, \
     phase:1, \
     pass, \
     nolog, \
     ctl:ruleRemoveTargetById=942100;ARGS:seclevel, \
     msg:'DVWA exclusion: security level selector'"


# ── 4. PHP Session Cookie ─────────────────────────────────────
# DVWA's PHPSESSID is long and random — CRS occasionally flags
# it under rule 942440 (SQL comment sequence).
SecRuleRemoveTargetById 942440 "REQUEST_COOKIES:PHPSESSID"


# ── 5. Content-Type header for AJAX requests ─────────────────
# DVWA's JavaScript makes XHR calls with application/json bodies.
# CRS 920420 checks for allowed content types; JSON is safe here.
SecRuleRemoveById 920420


# ── 6. File Upload in DVWA ───────────────────────────────────
# The file upload challenge requires multipart form-data.
# Allow it but keep the filename inspection active.
SecRule REQUEST_URI "@beginsWith /vulnerabilities/upload" \
    "id:9001006, \
     phase:1, \
     pass, \
     nolog, \
     ctl:ruleRemoveById=200002, \
     msg:'DVWA exclusion: file upload challenge multipart'"


# ── Verification reminder ─────────────────────────────────────
# After applying these exclusions, verify the following still block:
#   GET /vulnerabilities/sqli/?id=1+UNION+SELECT+1,2--
#   GET /vulnerabilities/xss_r/?name=<script>alert(1)</script>
#   GET /vulnerabilities/sqli/?id=1'+OR+'1'='1
# ─────────────────────────────────────────────────────────────