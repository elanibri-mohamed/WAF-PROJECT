# ─────────────────────────────────────────────────────────────
#  Custom ModSecurity Exclusions for DVWA
#  Compatible with ModSecurity v3 + OWASP CRS (owasp/modsecurity-crs:nginx)
#
#  All exclusions use SecRule + ctl: syntax — the only reliable
#  method in ModSec v3. SecRuleRemoveTargetById as a standalone
#  directive is NOT supported in v3.
# ─────────────────────────────────────────────────────────────

# ── 1. DVWA Setup Page ───────────────────────────────────────
SecRule REQUEST_URI "@beginsWith /setup.php" \
    "id:9001001,phase:1,pass,nolog,\
     ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:db_password,\
     msg:'DVWA: setup.php db_password exclusion'"

# ── 2. DVWA Login Page ───────────────────────────────────────
SecRule REQUEST_URI "@beginsWith /login.php" \
    "id:9001002,phase:1,pass,nolog,\
     ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:username,\
     ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:password,\
     msg:'DVWA: login.php credential exclusion'"

# ── 3. DVWA Security Settings ────────────────────────────────
SecRule REQUEST_URI "@beginsWith /security.php" \
    "id:9001003,phase:1,pass,nolog,\
     ctl:ruleRemoveTargetById=942100;ARGS:seclevel,\
     msg:'DVWA: security level selector exclusion'"

# ── 4. PHP Session Cookie (942440 SQL comment detection) ─────
SecRule REQUEST_URI "@rx ." \
    "id:9001004,phase:1,pass,nolog,\
     ctl:ruleRemoveTargetById=942440;REQUEST_COOKIES:PHPSESSID,\
     msg:'DVWA: PHPSESSID cookie exclusion from 942440'"

# ── 5. File Upload Challenge ──────────────────────────────────
SecRule REQUEST_URI "@beginsWith /vulnerabilities/upload" \
    "id:9001005,phase:1,pass,nolog,\
     ctl:ruleRemoveById=200002,\
     msg:'DVWA: file upload multipart exclusion'"