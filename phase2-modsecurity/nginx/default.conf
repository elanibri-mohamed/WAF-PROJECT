# ─────────────────────────────────────────────────────────────
#  Nginx reverse-proxy config for ModSecurity WAF
#  File: phase2-modsecurity/nginx/default.conf
#
#  The owasp/modsecurity-crs:nginx image uses envsubst to render
#  *.conf.template files, so use $BACKEND / $PORT env vars here.
# ─────────────────────────────────────────────────────────────

server {
    listen       ${PORT};
    server_name  _;

    # ── ModSecurity Configuration ─────────────────────────────
    modsecurity on;
    # Note: custom-exclusions.conf is auto-loaded by the CRS image
    # No need for explicit modsecurity_rules_file directive

    # ── Logging ──────────────────────────────────────────────
    access_log  ${ACCESSLOG} combined;
    error_log   ${ERRORLOG} warn;

    # ── Security headers (added by the WAF layer) ─────────────
    add_header X-WAF-Protected   "ModSecurity/CRS"   always;
    add_header X-Frame-Options   "SAMEORIGIN"         always;
    add_header X-Content-Type-Options "nosniff"       always;

    # ── Proxy to DVWA ─────────────────────────────────────────
    location / {
        proxy_pass         ${BACKEND};
        proxy_http_version 1.1;

        # Forward real client info
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;

        # Buffer — needed for ModSecurity body inspection
        proxy_request_buffering on;
        client_max_body_size    10m;
        client_body_buffer_size 128k;
    }

    # ── Custom 403 block page ─────────────────────────────────
    error_page 403 /waf-blocked.html;
    location = /waf-blocked.html {
        internal;
        return 403 '<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>403 — Blocked by WAF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Courier New", monospace;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border: 1px solid #ff4444;
      padding: 48px 56px;
      max-width: 540px;
      text-align: center;
    }
    .code { font-size: 72px; color: #ff4444; letter-spacing: -2px; }
    .title { font-size: 18px; margin: 12px 0 24px; color: #aaa; }
    .msg { font-size: 13px; color: #666; line-height: 1.7; }
    .rule { margin-top: 20px; font-size: 11px; color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">403</div>
    <div class="title">Request Blocked by WAF</div>
    <div class="msg">
      Your request was flagged as potentially malicious and has been blocked
      by ModSecurity + OWASP Core Rule Set.
    </div>
    <div class="rule">ModSecurity — OWASP CRS Active</div>
  </div>
</body>
</html>';
        add_header Content-Type "text/html";
    }
}